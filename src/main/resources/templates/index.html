<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Expense Tracker</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            min-height:100vh;
            background:#f5f7fb;
            font-family:'Inter',sans-serif;
            color:#111827;
            padding:40px 0;
        }

        /* MAIN CONTAINER */
        .main-container{
            width:94%;
            margin:auto;
            background:#ffffff;
            border:1px solid #e5e7eb;
            border-radius:18px;
            padding:30px;
            box-shadow:0 6px 20px rgba(0,0,0,0.06);
        }

        /* TOP SECTION */
        .top-section{
            display:flex;
            justify-content:space-between;
            align-items:center;
            flex-wrap:wrap;
            gap:20px;
            margin-bottom:25px;
        }

        .brand{
            display:flex;
            align-items:center;
            gap:15px;
        }

        .logo{
            width:55px;
            height:55px;
            border-radius:12px;
            background:#2563eb;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:1.5rem;
            color:white;
        }

        .title{
            font-size:1.8rem;
            font-weight:700;
            color:#111827;
        }

        .subtitle{
            color:#6b7280;
            font-size:0.95rem;
            margin-top:3px;
        }

        .date-box{
            background:#f3f4f6;
            padding:10px 16px;
            border-radius:10px;
            color:#374151;
            font-weight:500;
            border:1px solid #e5e7eb;
        }

        /* DASHBOARD */
        .dashboard-section{
            margin-bottom:20px;
        }

        /* TABLE */
        .table-wrapper{
            overflow-x:auto;
        }

        table{
            width:100%;
            border-collapse:collapse;
            border-radius:12px;
            overflow:hidden;
            background:#fff;
            border:1px solid #e5e7eb;
        }

        thead{
            background:#f9fafb;
        }

        thead th{
            padding:14px;
            text-align:left;
            font-weight:600;
            color:#374151;
            border-bottom:1px solid #e5e7eb;
        }

        tbody td{
            padding:14px;
            color:#111827;
            border-bottom:1px solid #f1f5f9;
        }

        tbody tr:hover{
            background:#f9fafb;
        }

        /* BUTTONS */
        .btn-custom{
            border:none;
            border-radius:8px;
            padding:6px 12px;
            font-weight:600;
            color:white;
            text-decoration:none;
            margin-right:5px;
            font-size:0.85rem;
            display:inline-block;
        }

        .btn-edit{
            background:#2563eb;
        }

        .btn-delete{
            background:#ef4444;
        }

        .btn-custom:hover{
            opacity:0.9;
            color:white;
        }

        /* BOTTOM SECTION */
        .bottom-section{
            margin-top:20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            flex-wrap:wrap;
            gap:15px;
        }

        .total-box{
            background:#f9fafb;
            padding:12px 16px;
            border-radius:10px;
            font-size:1rem;
            font-weight:600;
            border:1px solid #e5e7eb;
        }

        .total-box span{
            color:#2563eb;
        }

        .btn-add{
            background:#2563eb;
            color:white;
            padding:10px 18px;
            border-radius:10px;
            text-decoration:none;
            font-weight:600;
            transition:0.2s;
            display:inline-block;
        }

        .btn-add:hover{
            background:#1d4ed8;
            color:white;
            text-decoration:none;
        }

        /* RESPONSIVE */
        @media(max-width:768px){

            .title{
                font-size:1.5rem;
            }

            .main-container{
                padding:20px;
            }

            .bottom-section{
                flex-direction:column;
                align-items:stretch;
            }

            .btn-add{
                text-align:center;
            }
        }

    </style>

</head>

<body>

<div class="main-container">

    <!-- TOP SECTION -->
    <div class="top-section">

        <div class="brand">

            <div class="logo">
                💳
            </div>

            <div>

                <h1 class="title">Expense Tracker</h1>

                <p class="subtitle">Track • Manage • Analyze Expenses</p>

            </div>

        </div>

        <div class="date-box">
            <p th:text="|📅 ${today}|">Today</p>
        </div>

    </div>

    <!-- DASHBOARD -->
    <div class="dashboard-section">
        <th:block th:insert="~{/dashboard}"></th:block>
    </div>

    <!-- TABLE -->
    <div class="table-wrapper">

        <table>

            <thead>
            <tr>
                <th>Actions</th>
                <th>ID</th>
                <th>Description</th>
                <th>Amount</th>
                <th>Category</th>
                <th>Created</th>
                <th>Modified</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="ExpenseItem : ${ExpensesTrackerItems}">

                <td>
                    <a class="btn-custom btn-edit"
                       th:href="@{/edit/{id}(id=${ExpenseItem.id})}">
                        Edit
                    </a>

                    <a class="btn-custom btn-delete"
                       th:href="@{/delete/{id}(id=${ExpenseItem.id})}">
                        Delete
                    </a>
                </td>

                <td th:text="${ExpenseItem.id}"></td>
                <td th:text="${ExpenseItem.description}"></td>
                <td th:text="'₹ ' + ${ExpenseItem.price}"></td>
                <td th:text="${ExpenseItem.category}"></td>
                <td th:text="${ExpenseItem.createdDate}"></td>
                <td th:text="${ExpenseItem.modifiedDate}"></td>

            </tr>

            </tbody>

        </table>

    </div>

    <!-- BOTTOM -->
    <div class="bottom-section">

        <div class="total-box">
            Total Expenses:
            <span th:text="'₹ ' + (${totalPrice} ?: '0')"></span>
        </div>

        <a class="btn-add" href="/create-expensestracker">
            + Add New Expense
        </a>

    </div>

</div>

</body>
</html>
